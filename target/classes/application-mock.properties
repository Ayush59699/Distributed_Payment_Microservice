# MOCK PROFILE - No external services needed!
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=mock

spring.application.name=payment-service-mock

# --- Use H2 file-based persistence instead of Memory ---
spring.datasource.url=jdbc:h2:file:./data/payments_mock_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Disable external service autoconfiguration ---
spring.autoconfigure.exclude=

# --- Redis (Local Docker) ---
spring.data.redis.host=localhost
spring.data.redis.port=6379


# --- Stripe (placeholder - not used in mock endpoints) ---
stripe.api.key=sk_test_mock_key_not_used

# --- Logging ---
logging.level.com.plugpoint.paymentservice=DEBUG
logging.level.org.springframework.web=INFO

# --- Server ---
server.port=8080
