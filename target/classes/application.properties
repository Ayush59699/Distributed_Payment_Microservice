spring.application.name=payment-service

# --- DB Optimization ---
spring.datasource.url=jdbc:postgresql://localhost:5432/payments_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hikari Tuning
# IMPORTANT: Azure PostgreSQL B1ms allows ~50 total connections.
# With ACA auto-scaling up to 10 replicas, max-pool-size must stay LOW:
#   5 connections/replica × 10 replicas = 50 total (safe limit)
#   Setting this to 50/replica was crashing the DB under load (FATAL: no slots)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA Tuning
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# --- Messaging ---
spring.cloud.azure.servicebus.connection-string=${SERVICEBUS_CONNECTION_STRING}
spring.cloud.azure.servicebus.entity-name=payment-queue

# --- Production Logging (Info only to save CPU) ---
logging.level.com.plugpoint.paymentservice=INFO
logging.level.org.springframework.web=INFO

# --- Mock Payment Config ---
payment.mock.latency-ms=500
payment.mock.failure-rate=0.05