services:
  postgres:
    image: postgres:15
    container_name: payments-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: payments-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: payments-mq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
